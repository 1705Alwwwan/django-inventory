name: Deploy Django

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Docker
        run: |
          cd /opt/infra-lab/apps/django

          git fetch origin
          git reset --hard origin/main

          docker compose up -d --build
