services:

  django:
    image: python:3.12
    container_name: django
    restart: unless-stopped
    working_dir: /app

    command: >
      sh -c "
      pip install django psycopg2-binary django-redis django-storages boto3 pillow gunicorn &&
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

    volumes:
      - ./app:/app

    networks:
      - infra-network


  django-nginx:
    image: nginx:alpine
    container_name: django-nginx
    restart: unless-stopped

    depends_on:
      - django

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    ports:
      - "8081:80"

    networks:
      - infra-network


networks:
  infra-network:
    external: true
